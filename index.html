<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon TCG — Deck Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17; --surface: #1a1828; --surface2: #221f35; --border: #2e2a45;
  --accent: #f5c542; --accent2: #e05c5c; --text: #e8e4f0; --muted: #7a7494;
  --fire: #ff6b35; --water: #4fc3f7; --grass: #66bb6a; --lightning: #ffd54f;
  --psychic: #ce93d8; --fighting: #a1887f; --colorless: #90a4ae;
  --darkness: #7986cb; --metal: #b0bec5; --radius: 10px; --card-w: 160px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
/* scanline overlay */
body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 999; }
header { padding: 20px 32px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 20px; position: sticky; top: 0; background: rgba(15,14,23,0.95); backdrop-filter: blur(8px); z-index: 100; }
header h1 { font-family: 'Press Start 2P', monospace; font-size: 13px; color: var(--accent); letter-spacing: 1px; text-shadow: 0 0 20px rgba(245,197,66,0.4); line-height: 1.5; }
header h1 span { color: var(--accent2); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.deck-summary { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--muted); text-align: right; }
.deck-summary strong { color: var(--accent); display: block; font-size: 14px; margin-bottom: 4px; }
.deck-summary.full strong { color: var(--accent2); }
.btn { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 10px 14px; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px; }
.btn-primary { background: var(--accent); color: #0f0e17; }
.btn-primary:hover { background: #ffd54f; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(245,197,66,0.3); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-danger { background: transparent; color: var(--accent2); border: 1px solid var(--accent2); font-size: 7px; padding: 6px 10px; }
.btn-danger:hover { background: var(--accent2); color: #fff; }
.layout { display: grid; grid-template-columns: 1fr 320px; height: calc(100vh - 65px); }
/* LEFT: card browser */
.browser { overflow-y: auto; padding: 24px 28px; border-right: 1px solid var(--border); }
.controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px 10px 38px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
select { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; cursor: pointer; transition: border-color 0.2s; }
select:focus { border-color: var(--accent); }
.set-tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.set-tab { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; }
.set-tab:hover { color: var(--text); border-color: var(--muted); }
.set-tab.active { background: var(--accent); color: #0f0e17; border-color: var(--accent); }
.results-info { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr)); gap: 14px; }
.card-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; position: relative; }
.card-item:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); border-color: var(--accent); }
.card-item.maxed { opacity: 0.4; pointer-events: none; }
.card-item.in-deck { border-color: var(--accent); }
.card-item.in-deck::after { content: attr(data-count); position: absolute; top: 6px; right: 6px; background: var(--accent); color: #0f0e17; font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 3px 6px; border-radius: 4px; min-width: 20px; text-align: center; }
.card-img-wrap { width: 100%; aspect-ratio: 3/4.2; overflow: hidden; background: var(--surface2); display: flex; align-items: center; justify-content: center; }
.card-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }
.card-item:hover .card-img-wrap img { transform: scale(1.04); }
.card-img-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; }
.card-info { padding: 8px 10px; border-top: 1px solid var(--border); }
.card-name { font-size: 11px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
.card-type { font-size: 10px; color: var(--muted); }
.card-set-badge { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 2px 5px; border-radius: 3px; background: var(--surface2); color: var(--muted); }
.type-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
/* RIGHT: deck panel */
.deck-panel { display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
.deck-header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
.deck-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.deck-name-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-family: 'Press Start 2P', monospace; font-size: 8px; outline: none; transition: border-color 0.2s; }
.deck-name-input:focus { border-color: var(--accent); }
.deck-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-box { background: var(--surface2); border-radius: 6px; padding: 8px; text-align: center; }
.stat-box .stat-val { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--text); }
.stat-box .stat-lbl { font-size: 10px; color: var(--muted); margin-top: 3px; }
.validation-strip { margin-top: 10px; padding: 8px 10px; border-radius: 6px; font-size: 11px; font-weight: 500; text-align: center; display: none; }
.validation-strip.show { display: block; }
.validation-strip.ok { background: rgba(102,187,106,0.15); color: #66bb6a; border: 1px solid rgba(102,187,106,0.3); }
.validation-strip.warn { background: rgba(224,92,92,0.15); color: var(--accent2); border: 1px solid rgba(224,92,92,0.3); }
.deck-list { flex: 1; overflow-y: auto; padding: 12px 16px; }
.deck-group { margin-bottom: 16px; }
.deck-group-label { font-family: 'Press Start 2P', monospace; font-size: 7px; color: var(--muted); letter-spacing: 1px; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.deck-card-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
.deck-card-img { width: 32px; height: 45px; border-radius: 4px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.deck-card-name { flex: 1; font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.qty-ctrl { display: flex; align-items: center; gap: 4px; }
.qty-btn { width: 22px; height: 22px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; flex-shrink: 0; }
.qty-btn:hover { border-color: var(--accent); color: var(--accent); }
.qty-num { font-family: 'Press Start 2P', monospace; font-size: 9px; width: 14px; text-align: center; color: var(--accent); }
.deck-actions { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.deck-actions .btn { flex: 1; text-align: center; }
.empty-deck { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-deck .poke-emoji { font-size: 40px; margin-bottom: 12px; }
.empty-deck p { font-family: 'Press Start 2P', monospace; font-size: 8px; line-height: 1.8; }
.loading { text-align: center; padding: 60px 20px; color: var(--muted); }
.loading .spinner { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent); animation: blink 0.8s step-end infinite; display: block; margin-bottom: 12px; }
@keyframes blink { 50% { opacity: 0; } }
.error-msg { text-align: center; padding: 40px 20px; color: var(--accent2); font-size: 13px; }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--accent); color: #0f0e17; font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 12px 20px; border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 1000; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); white-space: nowrap; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--accent2); color: #fff; }
/* Deck management modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 28px; width: 400px; max-width: 90vw; }
.modal h2 { font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--accent); margin-bottom: 20px; }
.saved-deck-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; max-height: 280px; overflow-y: auto; }
.saved-deck-item { display: flex; align-items: center; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; gap: 10px; }
.saved-deck-item .d-name { flex:1; font-weight: 600; font-size: 13px; }
.saved-deck-item .d-count { font-size: 11px; color: var(--muted); }
.saved-deck-item .d-load { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 5px 8px; background: var(--accent); color: #0f0e17; border: none; border-radius: 4px; cursor: pointer; }
.saved-deck-item .d-del { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 5px 8px; background: transparent; color: var(--accent2); border: 1px solid var(--accent2); border-radius: 4px; cursor: pointer; }
.modal-close { width: 100%; }
.no-saved { color: var(--muted); font-size: 12px; text-align: center; padding: 20px; }
.card-grid { display: block; }
.card-grid-inner { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--card-w), 1fr)); gap: 14px; margin-bottom: 8px; }
.grid-section-header { font-family: 'Press Start 2P', monospace; font-size: 9px; color: var(--accent); letter-spacing: 1px; padding: 18px 0 10px; border-bottom: 1px solid var(--border); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.grid-type-header { font-size: 12px; font-weight: 600; color: var(--muted); padding: 10px 0 8px; display: flex; align-items: center; gap: 4px; margin-top: 4px; }
.grid-section-count { font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 400; color: var(--muted); margin-left: 4px; }
/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
/* ── MOBILE NAV BAR ─────────────────────────────────────────────────────── */
.mobile-tabs {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(15,14,23,0.97);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  z-index: 150;
  padding: 0;
}
.mobile-tabs-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  height: 56px;
}
.mobile-tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: color 0.15s;
  padding: 8px 0;
  position: relative;
}
.mobile-tab-btn.active { color: var(--accent); }
.mobile-tab-btn .tab-icon { font-size: 18px; line-height: 1; }
.mobile-tab-badge {
  position: absolute;
  top: 6px; right: calc(50% - 20px);
  background: var(--accent2);
  color: #fff;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  padding: 2px 4px;
  border-radius: 3px;
  min-width: 16px;
  text-align: center;
  display: none;
}
.mobile-tab-badge.visible { display: block; }

@media (max-width: 800px) {
  /* Header collapses cleanly */
  header {
    padding: 12px 16px 10px;
    gap: 10px;
    flex-wrap: nowrap;
  }
  header h1 {
    font-size: 9px;
    line-height: 1.6;
    flex-shrink: 0;
  }
  .header-right {
    gap: 6px;
    flex-wrap: nowrap;
    overflow: hidden;
    min-width: 0;
  }
  .deck-summary {
    display: none; /* shown in mobile tab badge instead */
  }
  /* Hide desktop buttons that become redundant or move to panel */
  .header-right .btn-ghost:not([href]) { display: none; }
  .header-right .btn-primary { font-size: 6px; padding: 8px 10px; white-space: nowrap; }
  .header-right a.btn { font-size: 6px; padding: 8px 10px; white-space: nowrap; }

  /* Full-height stacked layout with tab switching */
  .layout {
    display: block;
    height: calc(100vh - 57px); /* header height */
    position: relative;
    overflow: hidden;
  }
  .browser {
    position: absolute;
    inset: 0;
    bottom: 56px; /* mobile tab bar height */
    border-right: none;
    padding: 16px 12px;
    transition: opacity 0.2s, transform 0.2s;
  }
  .deck-panel {
    position: absolute;
    inset: 0;
    bottom: 56px;
    max-height: none;
    opacity: 0;
    pointer-events: none;
    transform: translateX(20px);
    transition: opacity 0.2s, transform 0.2s;
  }
  /* Active panel states */
  .browser.mobile-hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateX(-20px);
  }
  .deck-panel.mobile-visible {
    opacity: 1;
    pointer-events: all;
    transform: translateX(0);
  }

  /* Controls on mobile */
  .controls { gap: 8px; }
  .search-wrap { min-width: 0; }
  select { font-size: 13px; padding: 9px 10px; max-width: 110px; }

  /* Set tabs – scrollable row */
  .set-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .set-tabs::-webkit-scrollbar { display: none; }
  .set-tab { white-space: nowrap; flex-shrink: 0; padding: 8px 12px; font-size: 7px; }

  /* Card grid – 2 cols on phones */
  :root { --card-w: 140px; }
  .card-grid-inner {
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
  }

  /* Deck panel on mobile */
  .deck-header { padding: 14px 14px 12px; }
  .deck-stats { gap: 6px; }
  .stat-box .stat-val { font-size: 18px; }
  .stat-box .stat-lbl { font-size: 9px; }

  /* Bigger touch targets for qty buttons */
  .qty-btn { width: 30px; height: 30px; font-size: 18px; }
  .deck-card-row { padding: 7px 0; gap: 8px; }
  .deck-card-img { width: 36px; height: 50px; }

  /* Deck actions */
  .deck-actions { padding: 10px 14px 14px; gap: 8px; }
  .deck-actions .btn { padding: 12px 10px; font-size: 7px; }

  /* Show mobile nav */
  .mobile-tabs { display: block; }

  /* Toast above tab bar */
  .toast { bottom: 70px; }

  /* Modal tweaks */
  .modal { padding: 20px 16px; }
  .modal h2 { font-size: 9px; }
  .saved-deck-item { padding: 10px; gap: 8px; }

  /* Section headers */
  .grid-section-header { font-size: 8px; padding: 12px 0 8px; }
  .grid-type-header { font-size: 11px; padding: 8px 0 6px; }
}
</style>
</head>
<body>

<header>
  <h1>POKÉMON TCG<br><span>DECK BUILDER</span></h1>
  <div class="header-right">
    <div class="deck-summary" id="deck-summary">
      <strong>0 / 60</strong> cards
    </div>
    <button class="btn btn-ghost" onclick="openDecksModal()">MY DECKS</button>
    <button class="btn btn-primary" onclick="saveDeck()">SAVE DECK</button>
    <a href="pokemon-game.html" class="btn btn-ghost" style="text-decoration:none">▶ PLAY</a>
  </div>
</header>

<div class="layout">
  <!-- CARD BROWSER -->
  <div class="browser">
    <div class="set-tabs">
      <button class="set-tab active" data-set="">ALL SETS</button>
      <button class="set-tab" data-set="base1">BASE SET</button>
      <button class="set-tab" data-set="base2">JUNGLE</button>
      <button class="set-tab" data-set="base3">FOSSIL</button>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Search cards..." oninput="filterCards()">
      </div>
      <select id="type-filter" onchange="filterCards()">
        <option value="">All Types</option>
        <option value="Pokémon">Pokémon</option>
        <option value="Trainer">Trainer</option>
        <option value="Energy">Energy</option>
      </select>
    </div>
    <div class="results-info" id="results-info"></div>
    <div class="card-grid" id="card-grid">
      <div class="loading">
        <span class="spinner">LOADING...</span>
        <div style="font-size:12px">Fetching cards from pokemontcg.io</div>
      </div>
    </div>
  </div>

  <!-- DECK PANEL -->
  <div class="deck-panel">
    <div class="deck-header">
      <div class="deck-name-row">
        <input type="text" class="deck-name-input" id="deck-name" value="My Deck" placeholder="DECK NAME">
      </div>
      <div class="deck-stats">
        <div class="stat-box"><div class="stat-val" id="stat-poke">0</div><div class="stat-lbl">Pokémon</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-trainer">0</div><div class="stat-lbl">Trainers</div></div>
        <div class="stat-box"><div class="stat-val" id="stat-energy">0</div><div class="stat-lbl">Energy</div></div>
      </div>
      <div class="validation-strip" id="validation-strip"></div>
    </div>
    <div class="deck-list" id="deck-list">
      <div class="empty-deck">
        <div class="poke-emoji">🎴</div>
        <p>CLICK CARDS<br>TO ADD THEM<br>TO YOUR DECK</p>
      </div>
    </div>
    <div class="deck-actions">
      <button class="btn btn-ghost" onclick="clearDeck()">CLEAR</button>
      <button class="btn btn-primary" onclick="validateDeck(true)">VALIDATE</button>
    </div>
  </div>
</div>

<!-- Saved Decks Modal -->
<div class="modal-overlay" id="decks-modal">
  <div class="modal">
    <h2>SAVED DECKS</h2>
    <div class="saved-deck-list" id="saved-deck-list"></div>
    <button class="btn btn-ghost modal-close" onclick="closeDecksModal()">CLOSE</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Mobile bottom nav -->
<nav class="mobile-tabs" id="mobile-tabs" aria-label="Mobile navigation">
  <div class="mobile-tabs-inner">
    <button class="mobile-tab-btn active" id="mob-browse-btn" onclick="mobileSwitchTab('browse')">
      <span class="tab-icon">🃏</span>
      BROWSE
    </button>
    <button class="mobile-tab-btn" id="mob-deck-btn" onclick="mobileSwitchTab('deck')">
      <span class="tab-icon">📋</span>
      DECK
      <span class="mobile-tab-badge" id="mob-deck-badge"></span>
    </button>
  </div>
</nav>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>

  messagingSenderId: "660283340232",
  appId: "1:660283340232:web:68722a7b5f60de8cda7cfd"

// ─── STATE ──────────────────────────────────────────────────────────────────
const SET_NAMES = { base1: 'Base', base2: 'Jungle', base3: 'Fossil' };
const MAX_COPIES = 4;
const MAX_DECK = 60;
let allCards = [];
let filteredCards = [];
let deck = {};
let activeSet = '';

// ─── FETCH ──────────────────────────────────────────────────────────────────
async function fetchAllCards() {
  const grid = document.getElementById('card-grid');
  try {
    const res = await fetch('cards.json');
    if (!res.ok) throw new Error('cards.json not found');
    allCards = await res.json();
    filterCards();
  } catch(e) {
    grid.innerHTML = `<div class="error-msg">⚠️ Could not load cards.json.<br>Make sure it's in your repo.</div>`;
  }
}

// ─── FILTER / RENDER ────────────────────────────────────────────────────────
const TYPE_ORDER = ['Fire','Water','Grass','Lightning','Psychic','Fighting','Colorless','Darkness','Metal'];
const TYPE_LABELS = {
  Fire:'🔥 Fire', Water:'💧 Water', Grass:'🌿 Grass', Lightning:'⚡ Lightning',
  Psychic:'🔮 Psychic', Fighting:'👊 Fighting', Colorless:'⭐ Colorless',
  Darkness:'🌑 Darkness', Metal:'⚙️ Metal'
};

function cardEnergyType(c) {
  return (c.types && c.types[0]) ? c.types[0] : 'Colorless';
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const typeF = document.getElementById('type-filter').value;
  filteredCards = allCards.filter(c => {
    const matchSet = !activeSet || c.set.id === activeSet;
    const matchQ = !q || c.name.toLowerCase().includes(q);
    const matchType = !typeF || c.supertype === typeF;
    return matchSet && matchQ && matchType;
  });
  filteredCards.sort((a, b) => a.name.localeCompare(b.name));
  document.getElementById('results-info').textContent = `${filteredCards.length} card${filteredCards.length !== 1 ? 's' : ''}`;
  renderGrid();
}

function typeColor(types) {
  const t = types && types[0] ? types[0].toLowerCase() : '';
  const map = {
    fire:'#ff6b35', water:'#4fc3f7', grass:'#66bb6a', lightning:'#ffd54f',
    psychic:'#ce93d8', fighting:'#a1887f', colorless:'#90a4ae',
    darkness:'#7986cb', metal:'#b0bec5',
  };
  return map[t] || '#90a4ae';
}

function typeEmoji(supertype) {
  if (supertype === 'Energy') return '⚡';
  if (supertype === 'Trainer') return '🎩';
  return '🔴';
}

function cardHTML(c) {
  const inDeck = deck[c.id];
  const qty = inDeck ? inDeck.qty : 0;
  const isEnergy = c.supertype === 'Energy';
  const atMax = qty >= MAX_COPIES && !isEnergy;
  const deckFull = deckTotal() >= MAX_DECK;
  const disabled = (atMax || (deckFull && !inDeck)) ? 'maxed' : '';
  const imgSrc = c.images?.small || '';
  return `<div class="card-item ${inDeck ? 'in-deck' : ''} ${disabled}" data-count="${qty}" onclick="addCard('${c.id}')" title="${c.name} — click to add">
    <div class="card-img-wrap">
      ${imgSrc
        ? `<img src="${imgSrc}" alt="${c.name}" loading="lazy">`
        : `<div class="card-img-placeholder">${typeEmoji(c.supertype)}</div>`}
    </div>
    <div class="card-info">
      <div class="card-name">${c.name}</div>
      <div class="card-meta">
        <span class="card-type">
          <span class="type-dot" style="background:${typeColor(c.types)}"></span>
          ${isEnergy ? 'Energy' : c.supertype === 'Trainer' ? 'Trainer' : cardEnergyType(c)}
        </span>
        <span class="card-set-badge">${SET_NAMES[c.set.id] || c.set.id}</span>
      </div>
    </div>
  </div>`;
}

function renderGrid() {
  const grid = document.getElementById('card-grid');
  if (!filteredCards.length) {
    grid.innerHTML = `<div class="error-msg" style="grid-column:1/-1;padding:40px">No cards match your search.</div>`;
    return;
  }
  const pokemon = filteredCards.filter(c => c.supertype === 'Pokémon');
  const trainers = filteredCards.filter(c => c.supertype === 'Trainer');
  const energies = filteredCards.filter(c => c.supertype === 'Energy');
  let html = '';

  if (pokemon.length) {
    html += sectionHeader('Pokémon', pokemon.length);
    const byType = {};
    pokemon.forEach(c => {
      const t = cardEnergyType(c);
      if (!byType[t]) byType[t] = [];
      byType[t].push(c);
    });
    for (const t of TYPE_ORDER) {
      if (!byType[t]) continue;
      html += typeGroupHeader(t, typeColor([t]), byType[t].length);
      html += `<div class="card-grid-inner">` + byType[t].map(cardHTML).join('') + `</div>`;
    }
    Object.keys(byType).filter(t => !TYPE_ORDER.includes(t)).forEach(t => {
      html += typeGroupHeader(t, typeColor([t]), byType[t].length);
      html += `<div class="card-grid-inner">` + byType[t].map(cardHTML).join('') + `</div>`;
    });
  }
  if (trainers.length) {
    html += sectionHeader('Trainers', trainers.length);
    html += `<div class="card-grid-inner">` + trainers.map(cardHTML).join('') + `</div>`;
  }
  if (energies.length) {
    html += sectionHeader('Energy', energies.length);
    html += `<div class="card-grid-inner">` + energies.map(cardHTML).join('') + `</div>`;
  }
  grid.innerHTML = html;
}

function sectionHeader(label, count) {
  return `<div class="grid-section-header">${label} <span class="grid-section-count">${count}</span></div>`;
}

function typeGroupHeader(type, color, count) {
  return `<div class="grid-type-header">
    <span class="type-dot" style="background:${color};width:10px;height:10px;display:inline-block;border-radius:50%;margin-right:6px;vertical-align:middle"></span>
    ${TYPE_LABELS[type] || type} <span class="grid-section-count">${count}</span>
  </div>`;
}

// ─── DECK OPS ───────────────────────────────────────────────────────────────
function deckTotal() {
  return Object.values(deck).reduce((s, v) => s + v.qty, 0);
}

function addCard(id) {
  const card = allCards.find(c => c.id === id);
  if (!card) return;
  const isEnergy = card.supertype === 'Energy';
  const existing = deck[id];
  const qty = existing ? existing.qty : 0;
  if (!isEnergy && qty >= MAX_COPIES) { showToast('Max 4 copies allowed!', true); return; }
  if (deckTotal() >= MAX_DECK) { showToast('Deck is full! (60 cards)', true); return; }
  deck[id] = { card, qty: qty + 1 };
  renderDeck(); renderGrid(); validateDeck(false);
}

function changeQty(id, delta) {
  if (!deck[id]) return;
  const card = deck[id].card;
  const isEnergy = card.supertype === 'Energy';
  const newQty = deck[id].qty + delta;
  if (delta > 0) {
    if (!isEnergy && newQty > MAX_COPIES) { showToast('Max 4 copies!', true); return; }
    if (deckTotal() >= MAX_DECK) { showToast('Deck full!', true); return; }
  }
  if (newQty <= 0) { delete deck[id]; }
  else { deck[id].qty = newQty; }
  renderDeck(); renderGrid(); validateDeck(false);
}

function clearDeck() {
  if (!Object.keys(deck).length) return;
  deck = {};
  renderDeck(); renderGrid(); updateHeader();
  document.getElementById('validation-strip').className = 'validation-strip';
}

// ─── RENDER DECK ────────────────────────────────────────────────────────────
function renderDeck() {
  const list = document.getElementById('deck-list');
  const entries = Object.values(deck);
  if (!entries.length) {
    list.innerHTML = `<div class="empty-deck"><div class="poke-emoji">🎴</div><p>CLICK CARDS<br>TO ADD THEM<br>TO YOUR DECK</p></div>`;
    updateHeader(); updateStats(0,0,0); return;
  }
  const groups = { 'Pokémon': [], 'Trainer': [], 'Energy': [] };
  entries.forEach(e => {
    const g = e.card.supertype;
    if (groups[g]) groups[g].push(e); else groups['Trainer'].push(e);
  });
  Object.values(groups).forEach(g => g.sort((a,b) => a.card.name.localeCompare(b.card.name)));
  let html = '';
  for (const [label, cards] of Object.entries(groups)) {
    if (!cards.length) continue;
    const groupTotal = cards.reduce((s,c) => s+c.qty, 0);
    html += `<div class="deck-group"><div class="deck-group-label">${label.toUpperCase()} (${groupTotal})</div>`;
    cards.forEach(({card, qty}) => {
      const img = card.images?.small;
      html += `<div class="deck-card-row">
        ${img
          ? `<img class="deck-card-img" src="${img}" alt="${card.name}" loading="lazy">`
          : `<div class="deck-card-img" style="display:flex;align-items:center;justify-content:center;font-size:18px;">${typeEmoji(card.supertype)}</div>`}
        <span class="deck-card-name">${card.name}</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty('${card.id}', -1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${card.id}', 1)">+</button>
        </div>
      </div>`;
    });
    html += '</div>';
  }
  list.innerHTML = html;
  const poke = groups['Pokémon'].reduce((s,c)=>s+c.qty,0);
  const trainer = groups['Trainer'].reduce((s,c)=>s+c.qty,0);
  const energy = groups['Energy'].reduce((s,c)=>s+c.qty,0);
  updateStats(poke, trainer, energy);
  updateHeader();
}

function updateStats(p, t, e) {
  document.getElementById('stat-poke').textContent = p;
  document.getElementById('stat-trainer').textContent = t;
  document.getElementById('stat-energy').textContent = e;
}

function updateHeader() {
  const total = deckTotal();
  const summary = document.getElementById('deck-summary');
  summary.innerHTML = `<strong>${total} / 60</strong>cards`;
  summary.className = 'deck-summary' + (total >= MAX_DECK ? ' full' : '');
}

// ─── VALIDATE ───────────────────────────────────────────────────────────────
function validateDeck(showResult) {
  const total = deckTotal();
  const issues = [];
  if (total < MAX_DECK) issues.push(`Need ${MAX_DECK - total} more card${MAX_DECK - total !== 1 ? 's' : ''}`);
  if (total > MAX_DECK) issues.push(`${total - MAX_DECK} cards over limit`);
  const pokemon = Object.values(deck).filter(e => e.card.supertype === 'Pokémon');
  const basics = pokemon.filter(e => e.card.subtypes && e.card.subtypes.includes('Basic'));
  if (!basics.length) issues.push('Need at least 1 Basic Pokémon');
  const strip = document.getElementById('validation-strip');
  if (showResult || total > 0) {
    if (!issues.length) {
      strip.textContent = '✓ Deck is valid and ready to play!';
      strip.className = 'validation-strip show ok';
    } else {
      strip.textContent = issues[0];
      strip.className = 'validation-strip show warn';
    }
  }
  return issues.length === 0;
}

// ─── SAVE / LOAD (Firebase) ──────────────────────────────────────────────────
async function saveDeck() {
  const name = document.getElementById('deck-name').value.trim() || 'My Deck';
  if (!Object.keys(deck).length) { showToast('Deck is empty!', true); return; }
  showToast('Saving...');

  const deckData = {
    name,
    savedAt: Date.now(),
    deck: Object.fromEntries(Object.entries(deck).map(([id, {card, qty}]) => [
      id, {
        cardId: id,
        qty,
        name: card.name,
        supertype: card.supertype,
        img: card.images?.small || '',
        // ── PATCH: extra fields needed by pokemon-game.html ──
        subtypes: card.subtypes || [],
        hp: card.hp || '',
        attacks: card.attacks || [],
        types: card.types || []
      }
    ]))
  };

  const key = name.replace(/[.#$[\]]/g, '_');
  await db.ref(`decks/${key}`).set(deckData);
  showToast(`"${name}" saved!`);
}

async function openDecksModal() {
  const list = document.getElementById('saved-deck-list');
  list.innerHTML = `<div class="no-saved">Loading...</div>`;
  document.getElementById('decks-modal').classList.add('show');
  try {
    const snap = await db.ref('decks').once('value');
    const saved = snap.val() || {};
    const entries = Object.values(saved).sort((a,b) => b.savedAt - a.savedAt);
    if (!entries.length) {
      list.innerHTML = `<div class="no-saved">No saved decks yet.</div>`;
    } else {
      list.innerHTML = entries.map(d => {
        const total = Object.values(d.deck).reduce((s,c)=>s+c.qty,0);
        return `<div class="saved-deck-item">
          <div>
            <div class="d-name">${d.name}</div>
            <div class="d-count">${total} cards</div>
          </div>
          <button class="d-load" onclick="loadDeck('${encodeURIComponent(d.name)}')">LOAD</button>
          <button class="d-del" onclick="deleteDeck('${encodeURIComponent(d.name)}')">DEL</button>
        </div>`;
      }).join('');
    }
  } catch(e) {
    list.innerHTML = `<div class="no-saved" style="color:var(--accent2)">Could not connect to Firebase.</div>`;
  }
}

function closeDecksModal() {
  document.getElementById('decks-modal').classList.remove('show');
}

async function loadDeck(encodedName) {
  const name = decodeURIComponent(encodedName);
  const key = name.replace(/[.#$[\]]/g, '_');
  const snap = await db.ref(`decks/${key}`).once('value');
  const d = snap.val();
  if (!d) { showToast('Deck not found', true); return; }
  deck = {};
  Object.values(d.deck).forEach(entry => {
    const full = allCards.find(c => c.id === entry.cardId);
    if (full) {
      deck[entry.cardId] = { card: full, qty: entry.qty };
    } else {
      deck[entry.cardId] = {
        qty: entry.qty,
        card: {
          id: entry.cardId,
          name: entry.name,
          supertype: entry.supertype,
          images: { small: entry.img },
          subtypes: entry.subtypes || [],
          hp: entry.hp || '',
          attacks: entry.attacks || [],
          types: entry.types || []
        }
      };
    }
  });
  document.getElementById('deck-name').value = name;
  renderDeck(); renderGrid(); validateDeck(false);
  closeDecksModal();
  showToast(`"${name}" loaded!`);
}

async function deleteDeck(encodedName) {
  const name = decodeURIComponent(encodedName);
  const key = name.replace(/[.#$[\]]/g, '_');
  await db.ref(`decks/${key}`).remove();
  openDecksModal();
  showToast(`"${name}" deleted.`);
}

// ─── UI HELPERS ──────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2200);
}

// Set tab clicks
document.querySelectorAll('.set-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.set-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeSet = tab.dataset.set;
    filterCards();
  });
});

// Close modal on overlay click
document.getElementById('decks-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeDecksModal();
});

// ─── MOBILE TAB SWITCHING ────────────────────────────────────────────────────
let mobileActiveTab = 'browse';

function mobileSwitchTab(tab) {
  mobileActiveTab = tab;
  const browser = document.querySelector('.browser');
  const deckPanel = document.querySelector('.deck-panel');
  const browseBtn = document.getElementById('mob-browse-btn');
  const deckBtn = document.getElementById('mob-deck-btn');

  if (tab === 'browse') {
    browser.classList.remove('mobile-hidden');
    deckPanel.classList.remove('mobile-visible');
    browseBtn.classList.add('active');
    deckBtn.classList.remove('active');
  } else {
    browser.classList.add('mobile-hidden');
    deckPanel.classList.add('mobile-visible');
    deckBtn.classList.add('active');
    browseBtn.classList.remove('active');
  }
}

function updateMobileBadge() {
  const total = deckTotal();
  const badge = document.getElementById('mob-deck-badge');
  if (badge) {
    if (total > 0) {
      badge.textContent = total;
      badge.classList.add('visible');
    } else {
      badge.classList.remove('visible');
    }
  }
}

// Wrap updateHeader to also update mobile badge
const _baseUpdateHeader = updateHeader;
window.updateHeader = function() {
  _baseUpdateHeader();
  updateMobileBadge();
};

// Flash deck tab on mobile when card is added
const _baseAddCard = addCard;
window.addCard = function(id) {
  const prevTotal = deckTotal();
  _baseAddCard(id);
  if (window.innerWidth <= 800 && deckTotal() > prevTotal) {
    const btn = document.getElementById('mob-deck-btn');
    if (btn) {
      btn.style.color = 'var(--accent)';
      setTimeout(() => {
        if (!btn.classList.contains('active')) btn.style.color = '';
      }, 500);
    }
  }
};

// ─── INIT ────────────────────────────────────────────────────────────────────
fetchAllCards();
</script>
